<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calculator-card">
            <h1>Mortgage Calculator</h1>
            <p class="subtitle">Calculate your monthly mortgage payment</p>
            
            <form id="mortgageForm">
                <div class="input-group">
                    <label for="homePrice">Home Price</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="homePrice" name="homePrice" value="300000" min="0" step="1000" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="downPayment">Down Payment</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="downPayment" name="downPayment" value="60000" min="0" step="1000" required>
                    </div>
                    <div class="percentage-display">
                        <span id="downPaymentPercent">20.0%</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="loanTerm">Loan Term (Years)</label>
                    <input type="number" id="loanTerm" name="loanTerm" value="30" min="1" max="50" step="1" required>
                </div>

                <div class="input-group">
                    <label for="interestRate">Interest Rate (%)</label>
                    <input type="number" id="interestRate" name="interestRate" value="6.5" min="0" max="20" step="0.01" required>
                </div>

                <div class="input-group">
                    <label for="propertyTax">Annual Property Tax (Optional)</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="propertyTax" name="propertyTax" value="3000" min="0" step="100">
                    </div>
                </div>

                <div class="input-group">
                    <label for="homeInsurance">Annual Home Insurance (Optional)</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="homeInsurance" name="homeInsurance" value="1200" min="0" step="100">
                    </div>
                </div>

                <div class="input-group">
                    <label for="pmi">Monthly PMI (Optional)</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="pmi" name="pmi" value="0" min="0" step="10">
                    </div>
                </div>

                <button type="submit" class="calculate-btn">Calculate Payment</button>
            </form>

            <div id="results" class="results hidden">
                <h2>Your Monthly Payment</h2>
                <div class="monthly-payment">
                    <span class="payment-amount" id="monthlyPayment">$0</span>
                </div>

                <div class="breakdown">
                    <div class="breakdown-item">
                        <span class="breakdown-label">Principal & Interest</span>
                        <span class="breakdown-value" id="principalInterest">$0</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-label">Property Tax</span>
                        <span class="breakdown-value" id="monthlyPropertyTax">$0</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-label">Home Insurance</span>
                        <span class="breakdown-value" id="monthlyInsurance">$0</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="breakdown-label">PMI</span>
                        <span class="breakdown-value" id="monthlyPMI">$0</span>
                    </div>
                </div>

                <div class="summary">
                    <div class="summary-item">
                        <span class="summary-label">Loan Amount</span>
                        <span class="summary-value" id="loanAmount">$0</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Total Payment</span>
                        <span class="summary-value" id="totalPayment">$0</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Total Interest</span>
                        <span class="summary-value" id="totalInterest">$0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="calculator.js"></script>
</body>
</html>
